<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uoink Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="uoink-memory.css">
</head>
<body>
  <main class="redirect-shell">
    <section class="redirect-card" aria-labelledby="memory-title">
      <div class="wordmark" aria-label="Uoink">
        <span class="mark" aria-hidden="true">U</span>
        <span>OINK</span>
      </div>
      <p class="eyebrow">Memory moved</p>
      <h1 id="memory-title">Open your full library in the dashboard.</h1>
      <p class="copy">
        The dashboard Library is now the canonical Memory view: search, filters,
        activity, settings, and local runtime state all live in one place.
      </p>
      <div class="actions">
        <a class="primary" id="open-dashboard" href="http://127.0.0.1:5179/dashboard?tab=library">Open dashboard -&gt;</a>
        <button class="ghost" id="copy-link" type="button">Copy dashboard link</button>
      </div>
      <p class="hint" id="status">If the dashboard does not open, start the Uoink helper from the tray.</p>
    </section>
  </main>
  <script src="uoink-memory.js"></script>
</body>
</html>
