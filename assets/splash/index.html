<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uoink Splash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rust: #C2410C;
      --rust-bright: #F97316;
      --vermillion: #FF3D00;
      --acid: #FFD23F;
      --cream: #FFF4EC;
      --ink: #0A0A0A;
      --ink-warm: #15110D;
      --border: #2C2621;
      --muted: #C8B19F;
      --dim: #8F7B6E;
      --ok: #00C853;
      --font-ui: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-display: Bungee, Inter, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--cream);
      font-family: var(--font-ui);
    }

    .splash {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 18px;
      background:
        radial-gradient(circle at 100% 0%, rgba(255, 210, 63, 0.18), transparent 13rem),
        linear-gradient(180deg, #120f0d, var(--ink));
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.48);
      cursor: pointer;
    }

    .splash.failure {
      background:
        radial-gradient(circle at 100% 0%, rgba(255, 61, 0, 0.16), transparent 14rem),
        linear-gradient(180deg, #180d0a, var(--ink));
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 46px;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      background: var(--ink);
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--vermillion);
      font-family: var(--font-display);
      font-size: 24px;
      line-height: 1;
    }

    .mark {
      width: 28px;
      height: 28px;
    }

    .mark svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .close {
      border: 0;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .body {
      display: grid;
      gap: 12px;
      padding: 24px 26px;
    }

    .eyebrow {
      color: var(--rust-bright, #F97316);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--cream);
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    h1 em {
      color: var(--vermillion);
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
    }

    p {
      max-width: 58ch;
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .running-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-height: 34px;
      border: 1px solid rgba(0, 200, 83, 0.34);
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--ink-warm);
      color: var(--cream);
      font-weight: 800;
    }

    .running-pill .pip {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--ok);
      box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.58);
      animation: pulse 1.8s ease-out infinite;
    }

    .failure .running-pill {
      border-color: rgba(255, 61, 0, 0.45);
    }

    .failure .running-pill .pip {
      background: var(--vermillion);
      animation: none;
      box-shadow: none;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.58); }
      70% { box-shadow: 0 0 0 8px rgba(0, 200, 83, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0); }
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 13px;
      background: var(--ink-warm);
      color: var(--cream);
      cursor: pointer;
      font-weight: 800;
      text-decoration: none;
    }

    .button.primary {
      border-color: var(--vermillion);
      background: var(--vermillion);
      color: var(--ink);
    }

    .button[hidden],
    .steps[hidden],
    .path-box[hidden],
    .copy-status[hidden] {
      display: none;
    }

    .splash.extension .body {
      gap: 9px;
      padding: 20px 24px;
    }

    .splash.extension h1 {
      font-size: 24px;
      line-height: 1.14;
    }

    .splash.extension .actions {
      flex-wrap: nowrap;
    }

    .splash.extension .button {
      min-height: 36px;
      padding: 0 10px;
      font-size: 13px;
      white-space: nowrap;
    }

    .steps {
      display: grid;
      gap: 4px;
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .path-box {
      border: 1px solid rgba(255, 210, 63, 0.28);
      border-radius: 8px;
      padding: 8px 10px;
      background: rgba(255, 210, 63, 0.08);
      color: var(--cream);
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      user-select: text;
      cursor: text;
    }

    .copy-status {
      color: var(--acid);
      font-family: var(--font-mono);
      font-size: 11px;
      min-height: 14px;
    }

    .footnote {
      position: absolute;
      right: 18px;
      bottom: 14px;
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <section class="splash" id="splash" role="button" tabindex="0" aria-label="Open Uoink dashboard">
    <div class="bar">
      <div class="wordmark"><span class="mark" aria-hidden="true"></span><span>OINK</span></div>
      <button class="close" type="button" aria-label="Dismiss" id="dismiss">x</button>
    </div>
    <div class="body">
      <div class="eyebrow" id="eyebrow">You're set</div>
      <div class="running-pill" id="pill"><span class="pip"></span><span>Uoink is running</span></div>
      <h1 id="headline">Save the source. Write in your <em>voice.</em></h1>
      <p id="copy">Uoink any video, audio, or article to save the source on your disk, then let your AI write drafts in your voice.</p>
      <ol class="steps" id="steps" hidden></ol>
      <div class="path-box" id="extensionPath" hidden></div>
      <div class="copy-status" id="copyStatus" hidden></div>
      <div class="actions">
        <button class="button primary" type="button" data-primary>Open YouTube</button>
        <button class="button" type="button" data-secondary>Open dashboard</button>
        <button class="button" type="button" data-tertiary hidden>Done</button>
      </div>
    </div>
    <div class="footnote">local helper dashboard</div>
  </section>

  <script>
    const mark = '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M14 6 H40 V62 a10 10 0 0 0 20 0 V6 H86 V62 a36 36 0 0 1 -72 0 Z" fill="#C2410C"/><rect x="14" y="6" width="26" height="14" fill="#FFD23F"/><rect x="60" y="6" width="26" height="14" fill="#FFD23F"/></svg>';
    document.querySelector(".mark").innerHTML = mark;

    const splash = document.getElementById("splash");
    const els = {
      eyebrow: document.getElementById("eyebrow"),
      pill: document.getElementById("pill"),
      headline: document.getElementById("headline"),
      copy: document.getElementById("copy"),
      steps: document.getElementById("steps"),
      extensionPath: document.getElementById("extensionPath"),
      copyStatus: document.getElementById("copyStatus"),
      primary: document.querySelector("[data-primary]"),
      secondary: document.querySelector("[data-secondary]"),
      tertiary: document.querySelector("[data-tertiary]"),
    };
    let token = "";
    let primaryAction = "youtube";
    let secondaryAction = "dashboard";
    let tertiaryAction = "";
    let extensionPath = "";

    function nativeApi() {
      return window.pywebview && window.pywebview.api ? window.pywebview.api : null;
    }

    async function callNative(name, ...args) {
      const native = nativeApi();
      if (!native || typeof native[name] !== "function") return null;
      return native[name](...args);
    }

    function waitForNativeApi(timeoutMs = 1500) {
      if (nativeApi()) return Promise.resolve(nativeApi());
      return new Promise((resolve) => {
        const done = () => resolve(nativeApi());
        document.addEventListener("pywebviewready", done, { once: true });
        window.setTimeout(done, timeoutMs);
      });
    }

    function openExternal(url) {
      const native = nativeApi();
      if (native && native.open_url) {
        native.open_url(url);
        return;
      }
      window.open(url, "_blank", "noopener");
    }

    async function getToken() {
      if (token) return token;
      const res = await fetch("/token", { headers: { "X-Uoink-Client": "uoink-splash" } });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || "token unavailable");
      token = data.token;
      return token;
    }

    async function authFetch(path) {
      const res = await fetch(path, { headers: { "X-Uoink-Token": await getToken() } });
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    function setButton(button, text, action, visible = true) {
      button.textContent = text;
      button.hidden = !visible;
      if (button === els.primary) primaryAction = action;
      if (button === els.secondary) secondaryAction = action;
      if (button === els.tertiary) tertiaryAction = action;
    }

    function hideExtensionExtras() {
      els.steps.hidden = true;
      els.extensionPath.hidden = true;
      els.copyStatus.hidden = true;
      els.copyStatus.textContent = "";
    }

    function setMode({ mode, eyebrow, pill, headline, copy, primary, secondary, tertiary }) {
      splash.classList.toggle("failure", mode === "failure");
      splash.classList.toggle("extension", mode === "extension");
      if (mode !== "extension") hideExtensionExtras();
      els.eyebrow.textContent = eyebrow;
      els.pill.querySelector("span:last-child").textContent = pill;
      els.headline.innerHTML = headline;
      els.copy.textContent = copy;
      setButton(els.primary, primary.text, primary.action, true);
      setButton(els.secondary, secondary.text, secondary.action, true);
      setButton(els.tertiary, tertiary?.text || "", tertiary?.action || "", Boolean(tertiary));
    }

    function setFailure(detail) {
      setMode({
        mode: "failure",
        eyebrow: "Diagnostics",
        pill: "Uoink failed to start",
        headline: "Uoink couldn't <em>start.</em>",
        copy: detail || "Uoink failed to start. Check the helper log.",
        primary: { text: "Open diagnostics", action: "dashboard" },
        secondary: { text: "Dismiss", action: "dismiss" },
      });
    }

    function setKeyNeeded() {
      setMode({
        mode: "key-needed",
        eyebrow: "Setup needed",
        pill: "Anthropic key missing",
        headline: "Add your Anthropic <em>key.</em>",
        copy: "Add your Anthropic key to get going.",
        primary: { text: "Open Settings", action: "settings" },
        secondary: { text: "Open dashboard", action: "dashboard" },
      });
    }

    function setBadKey() {
      setMode({
        mode: "bad-key",
        eyebrow: "Setup needed",
        pill: "Key needs attention",
        headline: "Update your Anthropic <em>key.</em>",
        copy: "Your Anthropic key isn't working.",
        primary: { text: "Update key", action: "settings" },
        secondary: { text: "Open dashboard", action: "dashboard" },
      });
    }

    function setHappy() {
      setMode({
        mode: "happy",
        eyebrow: "You're set",
        pill: "Uoink is running \u2713",
        headline: "Save the source. Write in your <em>voice.</em>",
        copy: "Uoink any video, audio, or article to save the source on your disk, then let your AI write drafts in your voice.",
        primary: { text: "Open YouTube", action: "youtube" },
        secondary: { text: "Open dashboard", action: "dashboard" },
      });
    }

    function setExtensionHint(status) {
      extensionPath = status?.path || "";
      callNative("set_window_title", "Last step - load the extension");
      setMode({
        mode: "extension",
        eyebrow: "One-time setup",
        pill: status?.manifest_exists ? "Extension folder ready" : "Extension folder missing",
        headline: "Uoink Extension - load into Chrome (60 sec)",
        copy: "Chrome requires you to approve unpacked extensions manually.",
        primary: { text: "Open Chrome to chrome://extensions/", action: "extension-open" },
        secondary: { text: "Copy path", action: "copy-path" },
        tertiary: { text: "I've loaded it - done", action: "extension-done" },
      });
      els.steps.innerHTML = `
        <li>Open chrome://extensions/ in Chrome</li>
        <li>Turn ON "Developer mode" (top-right toggle)</li>
        <li>Click "Load unpacked" -> select this folder:</li>
      `;
      els.steps.hidden = false;
      els.extensionPath.textContent = extensionPath || "Extension folder unavailable";
      els.extensionPath.hidden = false;
      els.copyStatus.hidden = false;
    }

    async function loadDiagnostics() {
      if (window.UOINK_SPLASH_BOOT_FAILED) {
        setFailure(window.UOINK_SPLASH_BOOT_FAILED);
        return;
      }
      const params = new URLSearchParams(location.search);
      if (params.get("state") === "failed" || params.get("status") === "failed") {
        setFailure(params.get("detail") || "Uoink failed to start. Check the helper log.");
        return;
      }

      let health = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          health = await (await fetch("/health")).json();
          if (health && health.ok !== false) break;
        } catch (_) { /* helper may still be binding the port */ }
        if (attempt < 2) await new Promise((r) => setTimeout(r, 500));
      }
      if (!health || health.ok === false) {
        setFailure("Uoink failed to start. Check the helper log.");
        return;
      }

      await waitForNativeApi();
      try {
        const extension = await callNative("extension_status");
        if (extension && extension.should_show) {
          setExtensionHint(extension);
          return;
        }
      } catch (_) { /* browser fallback has no native extension helper */ }

      let diag = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          diag = await (await fetch("/diagnose")).json();
          if (diag && diag.ok !== false) break;
        } catch (_) { /* network not ready yet -- retry */ }
        if (attempt < 2) await new Promise((r) => setTimeout(r, 500));
      }
      if (!diag || diag.ok === false) {
        setFailure("Uoink failed to start. Check the helper log.");
        return;
      }
      const keyCheck = Array.isArray(diag.checks)
        ? diag.checks.find((check) => check.name === "anthropic_key_valid")
        : null;
      const keyValue = diag.anthropic_key_valid;
      if (keyValue === true || keyCheck?.status === "ok") {
        setHappy();
      } else if (keyValue === false || keyCheck?.status === "error") {
        setBadKey();
      } else {
        setKeyNeeded();
      }
    }

    function openDashboard() {
      const native = nativeApi();
      if (native && native.open_dashboard) {
        native.open_dashboard();
        return;
      }
      location.href = "/dashboard";
    }

    function openSettings() {
      const native = nativeApi();
      if (native && native.open_settings) {
        native.open_settings();
        return;
      }
      location.href = "/dashboard#settings/byo-key";
    }

    function dismiss() {
      const native = nativeApi();
      if (native && native.close) {
        native.close();
        splash.style.display = "none";
        return;
      }
      if (native && native.minimize) {
        native.minimize();
        splash.style.display = "none";
        return;
      }
      splash.style.display = "none";
    }

    async function openLastYoutube() {
      try {
        await authFetch("/open-last-youtube");
      } catch (_) {
        openExternal("https://youtube.com");
      }
    }

    async function copyPath() {
      try {
        const result = await callNative("copy_extension_path");
        let copied = Boolean(result && result.ok !== false);
        if (!copied && navigator.clipboard && extensionPath) {
          await navigator.clipboard.writeText(extensionPath);
          copied = true;
        }
        if (!copied) throw new Error("copy failed");
        els.copyStatus.textContent = "Path copied.";
      } catch (_) {
        els.copyStatus.textContent = "Copy failed. Select the path above and copy it manually.";
      }
    }

    async function runAction(action) {
      if (action === "dashboard") openDashboard();
      else if (action === "settings") openSettings();
      else if (action === "youtube") openLastYoutube();
      else if (action === "dismiss") dismiss();
      else if (action === "extension-open") {
        try { await callNative("open_chrome_extensions"); }
        catch (_) { openExternal("chrome://extensions/"); }
      } else if (action === "copy-path") {
        await copyPath();
      } else if (action === "extension-done") {
        const native = nativeApi();
        if (native && native.mark_extension_loaded) await native.mark_extension_loaded();
        else dismiss();
      }
    }

    splash.addEventListener("click", (event) => {
      if (event.target.closest("button")) return;
      if (!splash.classList.contains("extension")) openDashboard();
    });
    splash.addEventListener("keydown", (event) => {
      if ((event.key === "Enter" || event.key === " ") && !splash.classList.contains("extension")) openDashboard();
    });
    els.secondary.addEventListener("click", (event) => {
      event.stopPropagation();
      runAction(secondaryAction);
    });
    els.primary.addEventListener("click", (event) => {
      event.stopPropagation();
      runAction(primaryAction);
    });
    els.tertiary.addEventListener("click", (event) => {
      event.stopPropagation();
      runAction(tertiaryAction);
    });
    document.getElementById("dismiss").addEventListener("click", (event) => {
      event.stopPropagation();
      dismiss();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") dismiss();
    });
    loadDiagnostics();
  </script>
</body>
</html>
